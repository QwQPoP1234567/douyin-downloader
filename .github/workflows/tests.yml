name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run unit tests
        run: python -m pytest -q
      - name: Compile Python sources
        run: python -m compileall -q app scripts
      - name: Validate frontend JavaScript
        run: node --check app/static/app.js
      - name: Validate Docker Compose
        env:
          MYSQL_PASSWORD: ci-mysql-password
          MYSQL_ROOT_PASSWORD: ci-root-password
          DOUYIN_VNC_PASSWORD: ci-vnc-password
        run: |
          docker compose config --quiet
          docker compose -f docker-compose.setup.yml config --quiet
